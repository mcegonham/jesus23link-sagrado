<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Programação Direta no HTML</title>
    <style>
        body { font-family: 'Courier New', monospace; background: #1a1a2e; color: #e0e0e0; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .card { background: #16213e; padding: 25px; border-radius: 20px; border: 2px solid #4834d4; width: 450px; text-align: center; }
        
        /* O NOSSO CONSOLE VISUAL */
        #meu_console { 
            background: #000; color: #00ff00; padding: 15px; border-radius: 10px; 
            height: 150px; overflow-y: auto; text-align: left; font-size: 13px; 
            margin-top: 20px; border: 1px solid #333; box-shadow: inset 0 0 10px #000;
        }

        img { width: 100%; border-radius: 10px; margin: 15px 0; border: 2px solid #4834d4; }
        button { background: #4834d4; color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 16px; }
        button:hover { background: #686de0; }
        .log-entry { border-bottom: 1px solid #222; padding: 5px 0; }
    </style>
</head>
<body>

    <div class="card">
        <h2 id="titulo">Sistema Espiritual v1.0</h2>
        
        <img id="imagem" src="https://picsum.photos" alt="Inspiracao">
        
        <p id="verso">Aguardando comando...</p>

        <button id="btn_executar">EXECUTAR LOGS E CÁLCULOS</button>

        <!-- ONDE O CONSOLE VAI APARECER -->
        <div id="meu_console">
            > Sistema pronto. Aguardando clique...
        </div>
    </div>

    <script>
        // 1. O TEU MÉTODO: Mapear todos os IDs numa const única
        const ids = ['titulo', 'imagem', 'verso', 'btn_executar', 'meu_console'];
        const $ = {};
        ids.forEach(id => $[id] = document.getElementById(id));

        // 2. MODO "FORA DA CAIXA": Redirecionar o console.log para o HTML
        const logOriginal = console.log; 
        console.log = function(mensagem) {
            const linha = document.createElement('div');
            linha.className = 'log-entry';
            linha.innerHTML = `> ${mensagem}`;
            $.meu_console.appendChild(linha);
            $.meu_console.scrollTop = $.meu_console.scrollHeight; // Scroll automático
            logOriginal.apply(console, arguments); // Mantém o log no F12 também
        };

        // 3. AÇÃO
        let cliques = 0;

        $.btn_executar.addEventListener('click', () => {
            cliques++;
            
            // Alterando o DOM via $
            $.titulo.innerText = "Processamento Espiritual...";
            $.verso.innerText = "O segredo de avançar é começar.";
            $.imagem.src = `https://picsum.photos?random=${cliques}`;

            // USANDO O CONSOLE DIRETAMENTE NO HTML
            console.log("Botão acionado!");
            console.log("Seja feliz por favor!");
            
            // A conta da Maria (usando BigInt para não perder precisão)
            const contaMaria = BigInt(23) ** BigInt(34);
            console.log("Conta da Maria: " + contaMaria);
            
            console.log("Total de interações: " + cliques);
            console.log("----------------------------");
        });
    </script>
</body>
</html>
