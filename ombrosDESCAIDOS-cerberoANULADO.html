<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>A Descida do Espírito</title>
    <style>
        body { 
            background: #000; display: flex; align-items: center; 
            justify-content: center; height: 100vh; margin: 0; overflow: hidden;
        }

        /* O Espírito: Geometria Sagrada */
        .espirito {
            position: relative; width: 200px; height: 300px;
            display: flex; flex-direction: column; align-items: center;
        }

        /* Cabeça: A Lótus do Comando */
        .cabeca {
            width: 50px; height: 70px; background: #fff;
            border-radius: 50% 50% 40% 40%; box-shadow: 0 0 30px #fff;
            z-index: 2; animation: pulsar 3s infinite ease-in-out;
        }

        /* Ombros: O Ponto de Transição */
        .ombros {
            width: 180px; height: 40px; background: linear-gradient(90deg, transparent, #fff, transparent);
            margin-top: -10px; border-radius: 50%;
            animation: descair 5s infinite alternate ease-in-out;
        }

        /* A Aura de Descida */
        .corpo {
            width: 100px; height: 200px;
            background: linear-gradient(180deg, rgba(255,255,255,0.5), transparent);
            clip-path: polygon(20% 0%, 80% 0%, 100% 100%, 0% 100%);
            margin-top: 5px; opacity: 0.6;
        }

        @keyframes descair {
            0% { transform: translateY(0) scaleX(1.1); filter: blur(2px); }
            100% { transform: translateY(40px) scaleX(0.9); filter: blur(0); }
        }

        @keyframes pulsar {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.8; box-shadow: 0 0 50px #fff; }
        }

        .texto {
            position: absolute; bottom: 50px; color: #fff; 
            font-family: monospace; letter-spacing: 5px; opacity: 0.4;
        }
    </style>
</head>
<body>

    <div class="espirito">
        <div class="cabeca"></div>
        <div class="ombros"></div>
        <div class="corpo"></div>
    </div>

    <div class="texto">OMBROS DESCAÍDOS / CÉRBERO ANULADO</div>

</body>
</html>
